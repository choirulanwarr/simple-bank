version: v2
plugins:
  - remote: buf.build/protocolbuffers/go
    out: api/pb
    opt: paths=source_relative
  - remote: buf.build/grpc/go
    out: api/pb
    opt: paths=source_relative
managed:
  enabled: true
  go_package_prefix:
    default: github.com/choirulanwar/simple-bank/api/pb
    except:
      - buf.build/googleapis/googleapis