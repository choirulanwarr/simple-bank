# Production Docker Compose — VPS Deployment
#
# PostgreSQL & Redis diinstall NATIVE di VPS (bukan Docker).
# Compose ini hanya untuk service aplikasi (API + FE).
#
# Cara pakai:
#   1. Install PostgreSQL 16 + Redis 7 native (lihat install-db.sh)
#   2. Copy .env.prod dan isi credentials
#   3. docker compose -f deploy/docker-compose.prod.yml up -d

services:
  api:
    image: ghcr.io/choirulanwarr/simple-bank:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    environment:
      # PostgreSQL — native localhost
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-simple_bank}

      # gRPC
      GRPC_SERVER_ADDRESS: 0.0.0.0:9090

      # Token
      TOKEN_SYMMETRIC_KEY: ${TOKEN_SYMMETRIC_KEY}
      ACCESS_TOKEN_DURATION: ${ACCESS_TOKEN_DURATION:-15m}
      REFRESH_TOKEN_DURATION: ${REFRESH_TOKEN_DURATION:-24h}

      # Redis — native localhost
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}

      # Metrics
      METRICS_SERVER_ADDRESS: 0.0.0.0:9091
    healthcheck:
      test: ["CMD", "grpcurl", "-plaintext", "localhost:9090", "grpc.health.v1.Health/Check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - app-net

  simple-bank-fe:
    image: ghcr.io/choirulanwarr/simple-bank-fe:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
