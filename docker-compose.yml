# Development Docker Compose (alternative)
#
# Secara default, PostgreSQL & Redis berjalan NATIVE di OS (brew / systemctl).
# Compose ini hanya untuk yang tetap ingin pakai container untuk API.
#
# Cara pakai:
#   1. Pastikan PostgreSQL & Redis native sudah running
#   2. docker compose up -d
#   3. Atau untuk build & run: docker compose up -d --build

services:
  api:
    build: .
    ports:
      - "9090:9090"
    environment:
      # Pointing ke native PostgreSQL di host
      POSTGRES_HOST: host.docker.internal
      POSTGRES_PORT: 5432
      POSTGRES_USER: root
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: simple_bank

      GRPC_SERVER_ADDRESS: 0.0.0.0:9090

      TOKEN_SYMMETRIC_KEY: '12345678901234567890123456789032'
      ACCESS_TOKEN_DURATION: 15m
      REFRESH_TOKEN_DURATION: 24h

      # Pointing ke native Redis di host
      REDIS_HOST: host.docker.internal
      REDIS_PORT: 6379

      LOG_LEVEL: info
      METRICS_SERVER_ADDRESS: 0.0.0.0:9091
